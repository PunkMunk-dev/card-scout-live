<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Puffy cloud — 3 large round bumps -->
  <path d="
    M 80 320
    C 80 280, 100 220, 160 210
    C 150 140, 220 100, 270 130
    C 300 80, 390 80, 410 150
    C 460 160, 480 220, 440 280
    C 460 320, 440 340, 430 340
    L 80 340
    Z
  " fill="#6FBA2C" stroke="#6FBA2C" stroke-width="8" stroke-linejoin="round"/>
  <!-- Flat bottom -->
  <rect x="80" y="310" width="360" height="30" rx="15" fill="#6FBA2C"/>
  <!-- Eye outer ring -->
  <circle cx="260" cy="250" r="52" fill="none" stroke="#FFFFFF" stroke-width="14"/>
  <!-- Eye inner dot -->
  <circle cx="260" cy="250" r="16" fill="#FFFFFF"/>
</svg>
